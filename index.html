<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大小写批量转换器 - 免费在线工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; min-height: 100vh; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 20px; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        textarea { border: 1px solid #ddd; border-radius: 4px; padding: 12px; width: 100%; min-height: 200px; font-family: monospace; font-size: 14px; box-sizing: border-box; resize: vertical; }
        .btn { background: #007bff; color: #fff; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; margin: 5px 5px 5px 0; }
        .btn:hover { background: #0056b3; }
        .btn-secondary { background: #28a745; }
        .btn-secondary:hover { background: #218838; }
        .label { font-weight: 500; margin-bottom: 8px; display: block; color: #333; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
        .transform-btn { background: #6c757d; }
        .transform-btn:hover { background: #5a6268; }
    </style>
</head>
<body>
    <div class="container">
        <h1>大小写批量转换器</h1>
        <div class="card">
            <label class="label">输入文本</label>
            <textarea id="inputText" placeholder="在此粘贴需要转换的文本..."></textarea>
            <div class="btn-group">
                <button class="btn transform-btn" onclick="toUpperCase()">全大写 (UPPERCASE)</button>
                <button class="btn transform-btn" onclick="toLowerCase()">全小写 (lowercase)</button>
                <button class="btn transform-btn" onclick="toTitleCase()">首字母大写 (Title Case)</button>
                <button class="btn transform-btn" onclick="toCamelCase()">驼峰命名 (camelCase)</button>
                <button class="btn transform-btn" onclick="toPascalCase()">帕斯卡命名 (PascalCase)</button>
                <button class="btn transform-btn" onclick="toSnakeCase()">下划线命名 (snake_case)</button>
                <button class="btn transform-btn" onclick="toKebabCase()">连字符命名 (kebab-case)</button>
                <button class="btn transform-btn" onclick="toConstantCase()">常量命名 (CONSTANT_CASE)</button>
            </div>
            <button class="btn" onclick="clearAll()">清空</button>
        </div>
        <div class="card">
            <label class="label">转换结果</label>
            <textarea id="outputText" readonly style="background: #f9f9f9;"></textarea>
            <div style="margin-top: 16px;">
                <button class="btn" onclick="copyResult()">复制结果</button>
            </div>
        </div>
    </div>
    <script>
        function getText() {
            return document.getElementById('inputText').value;
        }

        function setOutput(text) {
            document.getElementById('outputText').value = text;
        }

        function toUpperCase() {
            setOutput(getText().toUpperCase());
        }

        function toLowerCase() {
            setOutput(getText().toLowerCase());
        }

        function toTitleCase() {
            const text = getText();
            setOutput(text.replace(/\w\S*/g, txt => txt.charAt(0).toUpperCase() + txt.substr(1).toLowerCase()));
        }

        function toCamelCase() {
            const text = getText();
            const words = text.split(/[\s_\-]+/).filter(w => w);
            if (words.length === 0) { setOutput(''); return; }
            const result = words[0].toLowerCase() + words.slice(1).map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');
            setOutput(result);
        }

        function toPascalCase() {
            const text = getText();
            const words = text.split(/[\s_\-]+/).filter(w => w);
            const result = words.map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join('');
            setOutput(result);
        }

        function toSnakeCase() {
            const text = getText();
            const result = text.replace(/([a-z])([A-Z])/g, '$1_$2')
                               .replace(/[\s\-]+/g, '_')
                               .toLowerCase();
            setOutput(result);
        }

        function toKebabCase() {
            const text = getText();
            const result = text.replace(/([a-z])([A-Z])/g, '$1-$2')
                               .replace(/[\s_]+/g, '-')
                               .toLowerCase();
            setOutput(result);
        }

        function toConstantCase() {
            const text = getText();
            const result = text.replace(/([a-z])([A-Z])/g, '$1_$2')
                               .replace(/[\s\-]+/g, '_')
                               .toUpperCase();
            setOutput(result);
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').value = '';
        }

        function copyResult() {
            const output = document.getElementById('outputText');
            output.select();
            document.execCommand('copy');
            alert('已复制到剪贴板');
        }
    </script>
</body>
</html>
